document_shapes:
  governed-spec:
    template: docs/templates/spec.md
    description: Durable module-level authority for purpose, behaviour, boundaries, dependencies, tests, and decisions.
    sections:
      - key: purpose
        heading: Purpose
        content: Why the governed component exists and what problem it solves.
        required: yes
        authorship: human
      - key: boundaries
        heading: Boundaries (non-goals)
        content: What this component deliberately does not own.
        required: yes
        authorship: human
        aliases:
          - Non-goals
      - key: behaviour
        heading: Behaviour
        content: Current system promise the implementation must satisfy; self-contained, provenance-only links.
        required: yes
        authorship: human
      - key: quality-attributes
        heading: Quality Attributes
        content: Component NFRs as testable scenarios; declare N/A when none.
        required: no
        authorship: human
      - key: customer-experience
        heading: Customer Experience
        content: User/operator-facing behaviour; required when interactive, else N/A.
        required: no
        authorship: human
      - key: requires
        heading: Requires
        content: Inbound seam (= a contract's consumes); dependencies, definitions, contracts, specs, external systems.
        required: yes
        authorship: human
      - key: provides
        heading: Provides
        content: Outbound seam (= a contract's produces); exports, contracts, commands, files, schemas, behaviours.
        required: yes
        authorship: human
      - key: tests
        heading: Tests
        content: Verification surfaces by tier.
        required: yes
        authorship: auto
      - key: implementation-notes
        heading: Implementation Notes
        content: Implementation guidance plus the Design record provenance changelog.
        required: yes
        authorship: human
      - key: decisions
        heading: Decisions
        content: Durable decisions (Alternatives + Rationale) harvested or authored for this component.
        required: yes
        authorship: append-auto
  design-spec:
    template: docs/templates/design-spec.md
    description: Pre-build authority for non-trivial everything-else work.
    sections:
      - key: context
        heading: Context
        content: What prompted the change and relevant prior authority.
        required: yes
      - key: problem
        heading: Problem
        content: What is wrong, missing, confusing, risky, or newly required.
        required: yes
      - key: intended-behaviour
        heading: Intended Behaviour
        content: What should be true after the change.
        required: yes
      - key: customer-experience
        heading: Customer Experience
        content: Human-visible workflow path, unknown/failure path, decision points, and confidence claims.
        required: no
      - key: out-of-scope
        heading: Out Of Scope
        content: Boundaries agents must not cross without escalation.
        required: yes
      - key: existing-authority
        heading: Existing Authority
        content: Governed specs, definitions, contracts, architecture sections, and files found during survey.
        required: yes
      - key: proposed-document-changes
        heading: Proposed Document Changes
        content: Source section for the Durable Document Change Set: durable files, operation, high-level change, reason, and phase.
        required: no
      - key: implementation-shape
        heading: Implementation Shape
        content: High-level implementation approach, not task steps.
        required: yes
      - key: test-strategy
        heading: Test Strategy
        content: Test tiers and domain cases that matter for the change.
        required: yes
      - key: build-handoff
        heading: Build Handoff
        content: Plan path, required evidence, and escape-hatch triggers.
        required: yes
  plan:
    template: docs/templates/plan.md
    description: Agent execution plan consumed by build-stage implementation.
    sections:
      - key: external-interface-reliability
        heading: External Interface Reliability Pass
        content: Interfaces, contracts, fixtures, safety rules, and stop conditions for multi-agent or multi-workstream work.
        required: no
      - key: tests
        heading: Tests
        content: Test tiers and evidence required from code-bearing tasks.
        required: yes
      - key: file-structure
        heading: File Structure
        content: Files to create or modify and their responsibilities.
        required: yes
      - key: final-verification
        heading: Final Verification
        content: End-of-plan verification checklist.
        required: yes
  group:
    template: docs/templates/group.md
    description: Optional middle level — a subsystem as a collection of specs; owns integration/orchestration and (D7) thin orchestration glue, never business logic.
    sections:
      - key: job
        heading: Job (JTBD)
        content: What this sub-system is hired to do as a coherent unit.
        required: yes
        authorship: human
      - key: boundaries
        heading: Boundaries (non-goals)
        content: What this group is NOT; each non-goal redirects elsewhere.
        required: yes
        authorship: human
        aliases:
          - Non-goals
      - key: children
        heading: Children
        content: Sub-groups and/or component specs; bidirectional parent/contains.
        required: yes
        authorship: human
      - key: integration
        heading: Integration
        content: How children fit together topologically (calls, dependencies, data flow).
        required: yes
        authorship: human
      - key: orchestration
        heading: Orchestration
        content: How children coordinate at runtime / through workflows.
        required: yes
        authorship: human
      - key: shared-contracts
        heading: Shared Contracts
        content: Explicit interfaces consumed across children; N/A if none.
        required: no
        authorship: human
      - key: shared-schemas
        heading: Shared Schemas
        content: Data structures shared between children; N/A if none.
        required: no
        authorship: human
      - key: implementation-notes
        heading: Implementation Notes
        content: Guidance for the group's organization (groups own no business logic); Design record is a template-owned subsection here (not cataloged, matching governed-spec).
        required: no
        authorship: human
      - key: decisions
        heading: Decisions
        content: Durable decisions about this group's structure.
        required: no
        authorship: append-auto
