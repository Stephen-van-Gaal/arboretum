# Operational config for the roadmap system. Strategic content (in/out scope)
# lives in CLAUDE.md's "Strategic Anchor" section, not here.

# Cadence
time_horizon: "Through 2026-Q3"
last_reviewed: 2026-05-11
review_cadence_weeks: 12

# Adoption profile: minimal | lean | full
profile: lean

# WIP gate
wip_limit: 1
slack_wip_limit: 1
slack_types: [docs, chore]

# Type label aliases — adopt existing labels rather than relabeling issues.
type_label_aliases:
  feature: enhancement
  bug: bug
  docs: documentation

# Component values — required, project-defined.
component_values:
  - framework
  - workflows
  - skills
  - hooks
  - examples
  - docs

# Branch prefixes the WIP detector should recognize.
branch_prefixes: [feat, fix, docs, chore, refactor, spike]

# GitHub native sub-issues — feature-flagged; enabled in v0.8.0 (WS0 of
# pipeline-overhaul mega-epic). Arboretum tooling treats issues as having
# native sub-issues; downstream projects can opt out by overriding to false.
sub_issues_enabled: true

# Pipeline overhaul flags — WS2 of the pipeline-overhaul mega-epic
# (#295 / docs/superpowers/specs/2026-05-20-pipeline-overhaul-design.md).
#
# `workflow: v2` — unified workflow with agent-target triage fork (the
#                  default under arboretum v0.14+; sole writer of governed
#                  specs is /consolidate per design D3).
# `workflow: v1` — legacy Path A/B routing in /start (historical fallback;
#                  the v1 prose remains in each skill's SKILL.md under
#                  conditional sections for projects that explicitly opt
#                  back to v1).
pipeline:
  workflow: v2
